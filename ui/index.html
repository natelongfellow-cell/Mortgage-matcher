<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mortgage Matcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Mortgage Matcher</h1>
    <p>Upload a structured JSON file and an unstructured JSON file to compare.</p>

    <form id="compare-form">
      <div class="field-group">
        <label for="structured">Structured JSON</label>
        <input type="file" id="structured" name="structured" accept=".json" required />
      </div>

      <div class="field-group">
        <label for="unstructured">Unstructured JSON</label>
        <input type="file" id="unstructured" name="unstructured" accept=".json" required />
      </div>

      <button type="submit" id="compare-btn">Compare</button>
    </form>

    <div id="status" class="status"></div>

    <div id="results" class="results hidden">
      <h2>Results</h2>
      <p><strong>Overall score:</strong> <span id="overall-score"></span></p>
      <table>
        <thead>
          <tr>
            <th>Field</th>
            <th>Structured Value</th>
            <th>Unstructured Value</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
